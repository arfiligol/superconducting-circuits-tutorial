<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="Workflow from HFSS data to analysis outputs">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="300" fill="#f8fafc"/>

  <g stroke="url(#line)" stroke-width="6" fill="none">
    <path d="M160 160 H1040"/>
  </g>

  <g font-family="Arial, sans-serif" text-anchor="middle">
    <g transform="translate(160,160)">
      <circle r="58" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
      <text y="-6" font-size="17" font-weight="700" fill="#1e3a8a">HFSS / VNA</text>
      <text y="18" font-size="14" fill="#334155">Export CSV</text>
    </g>

    <g transform="translate(440,160)">
      <circle r="58" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
      <text y="-6" font-size="17" font-weight="700" fill="#14532d">Preprocess</text>
      <text y="18" font-size="14" fill="#334155">sc preprocess</text>
    </g>

    <g transform="translate(740,160)">
      <circle r="58" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
      <text y="-6" font-size="17" font-weight="700" fill="#78350f">Model Fit</text>
      <text y="18" font-size="14" fill="#334155">Ls, Ceff, f0</text>
    </g>

    <g transform="translate(1040,160)">
      <circle r="58" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
      <text y="-6" font-size="17" font-weight="700" fill="#7f1d1d">Visualize</text>
      <text y="18" font-size="14" fill="#334155">Flux / Resonance</text>
    </g>
  </g>
</svg>
