[project.theme]
custom_dir = "overrides"
language = "en"
features = [
  "content.code.copy",
  "content.code.annotate",
  "navigation.tabs",
  "navigation.top",
  "search.highlight",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
scheme = "default"
primary = "indigo"
accent = "indigo"

[project.theme.palette.toggle]
icon = "lucide/sun-moon"
name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "indigo"
accent = "indigo"

[project.theme.palette.toggle]
icon = "lucide/sun"
name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "indigo"
accent = "orange"

[project.theme.palette.toggle]
icon = "lucide/moon-star"
name = "Switch to system preference"

[project.extra]
alternate = [
  { "name" = "繁體中文", "link" = "https://arfiligol.github.io/superconducting-circuits-tutorial/", "lang" = "zh-TW" },
  { "name" = "English", "link" = "https://arfiligol.github.io/superconducting-circuits-tutorial/en/", "lang" = "en" },
]
