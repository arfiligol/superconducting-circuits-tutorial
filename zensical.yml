site_name: Superconducting Circuits Tutorial
site_url: https://arfiligol.github.io/superconducting-circuits-tutorial/
repo_url: https://github.com/arfiligol/superconducting-circuits-tutorial
repo_name: arfiligol/superconducting-circuits-tutorial

theme:
  name: zensical
  palette:
    - media: "(prefers-color-scheme)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: lucide/sun-moon
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: lucide/sun
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: orange
      toggle:
        icon: lucide/moon-star
        name: Switch to system preference
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: en

  - glightbox
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: false
      reconfigure_search: false
      languages:
        - locale: zh-TW
          default: true
          name: 繁體中文
          build: true
          site_name: 超導電路教學
          theme:
            language: zh-TW
          nav_translations:
            Home: 首頁
            Getting Started: 入門
            Installation: 安裝環境
            First Simulation: 第一次模擬
            Understanding hbsolve: 理解 hbsolve
            How-to Guides: 操作指南
            Tutorials: 教學
            LC Resonator: LC 共振器
            Parameter Sweep: 參數掃描
            Explanation: 解釋 (Explanation)
            Physics: 物理概念
            Architecture: 架構設計
            Harmonic Balance: Harmonic Balance
            S/Z/Y Parameters: S/Z/Y 參數
            Reference: 參考
            Plotting Utilities: 繪圖工具 ili_plot
            Different Qubit Structure Frequency Comparison Table: 不同 Qubit 結構頻率比較表
            Notebooks: 研究筆記
            Floating Qubit Study: Floating Qubit 研究
        - locale: en
          name: English
          build: true
          site_name: Superconducting Circuits Tutorial

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

not_in_nav: |
  explanation/harmonic-balance.en.md
  explanation/s-parameters.en.md
  reference/cli/generated/**


extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/arfiligol

