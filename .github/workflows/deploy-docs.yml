name: Deploy Zensical Docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Build docs (ZH-TW)
        run: uv run --group dev zensical build -f zensical.yml

      - name: Prepare EN docs folder
        run: |
          cp -a docs docs_en
          find docs_en -depth -name "*.en.md" -exec sh -c 'mv "$1" "${1%.en.md}.md"' _ {} \;

      - name: Build docs (EN)
        run: uv run --group dev zensical build -f zensical.en.yml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
