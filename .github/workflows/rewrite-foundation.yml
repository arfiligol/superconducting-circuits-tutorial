name: Rewrite Foundation

on:
  pull_request:
    paths:
      - ".github/workflows/rewrite-foundation.yml"
      - "package.json"
      - "README.md"
      - ".gitignore"
      - "scripts/rewrite_*.sh"
      - "frontend/**"
      - "backend/**"
      - "desktop/**"
  push:
    paths:
      - ".github/workflows/rewrite-foundation.yml"
      - "package.json"
      - "README.md"
      - ".gitignore"
      - "scripts/rewrite_*.sh"
      - "frontend/**"
      - "backend/**"
      - "desktop/**"

jobs:
  rewrite-foundation:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install rewrite dependencies
        run: npm run rewrite:install

      - name: Run rewrite checks
        run: npm run rewrite:check

      - name: Build rewrite workspaces
        run: npm run rewrite:build
