name: Docs Route Integrity

on:
  pull_request:
    paths:
      - "docs/**"
      - "zensical.toml"
      - "zensical.en.toml"
      - "scripts/build_docs_sites.sh"
      - "scripts/prepare_docs_locales.sh"
      - "scripts/check_docs_nav_routes.py"
      - ".github/workflows/docs-route-integrity.yml"
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "zensical.toml"
      - "zensical.en.toml"
      - "scripts/build_docs_sites.sh"
      - "scripts/prepare_docs_locales.sh"
      - "scripts/check_docs_nav_routes.py"
      - ".github/workflows/docs-route-integrity.yml"

jobs:
  docs-routes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Validate nav -> source routes
        run: uv run python scripts/check_docs_nav_routes.py --check-source

      - name: Build docs sites
        run: ./scripts/build_docs_sites.sh

      - name: Validate nav -> built html routes
        run: uv run python scripts/check_docs_nav_routes.py --check-built
