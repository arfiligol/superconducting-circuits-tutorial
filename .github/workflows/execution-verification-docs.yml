name: Execution Verification Docs

on:
  pull_request:
    paths:
      - ".github/workflows/execution-verification-docs.yml"
      - "docs/reference/guardrails/execution-verification/**"
      - ".agent/rules/execution-verification/**"
  push:
    paths:
      - ".github/workflows/execution-verification-docs.yml"
      - "docs/reference/guardrails/execution-verification/**"
      - ".agent/rules/execution-verification/**"

jobs:
  docs-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync root documentation environment
        run: uv sync --group dev

      - name: Validate docs source routes
        run: uv run python scripts/check_docs_nav_routes.py --check-source

      - name: Prepare locale trees
        run: ./scripts/prepare_docs_locales.sh

      - name: Build zh-TW docs
        run: uv run --group dev zensical build -f zensical.toml

      - name: Build static docs site
        run: ./scripts/build_docs_sites.sh

      - name: Validate built docs routes
        run: uv run python scripts/check_docs_nav_routes.py --check-built
